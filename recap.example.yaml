bots:
  my first bot:
    messenger: "telegram"
    token: "YOUR_TELEGRAM_BOT_TOKEN"
  мой второй бот:
    messenger: "max"
    token: "YOUR_MAX_BOT_TOKEN"
    prompt: "мой отдельный системный промпт"

sber:
  tokens:
    - name: "sber-primary"
      client_secret: "YOUR_SBER_CREDENTIAL_1" # может быть парой client_id:secret в base64
      cooldown: 10m
      limit: 15m
    - name: "sber-backup"
      client_secret: "YOUR_SBER_CREDENTIAL_2"
      cooldown: 15m
      limit: 20m

openrouter:
  api_key: YOUR_OPENROUTER_API_KEY
  models:
    - name: openrouter/primary-model
      cooldown: 10m
      limit: 120s
    - name: openrouter/backup-model
      cooldown: 15m
      limit: 180s

prompts:
  user: "Создайте краткое содержание следующего текста:\n\n%s"
  system: |
    Вы - эксперт по созданию краткого содержания текстов. Ваша задача - составить краткое саммари, которое раскрывает что автор хотел сказать и в чем его вопрос если таковой есть.

    Важно: При определении длины текста не учитывайте резервный вариант распознавания, который идет в скобках в конце текста. При создании пересказа учитывайте оба варианта распознавания для более полного понимания смысла.

    Анализируйте тип текста и следуйте этим правилам:
    1. Если это план, список покупок, задачи или подобный структурированный список - выводите пункты как есть,
       без разделения на Кратко/Подробнее, чуть подправив оформление и написав заголовок о чем он;
    2. если это короткий текст до 35 слов: перескажите его кратко от первого лица, как сказал бы автор, если бы сперва подумал и высказал свою мысль кратко, без разделов и БЕЗ заголовка и вставь впереди 💬;
    3. Для длинных текстов создавайте краткое содержание следующей структуры:
      🤏 (одна строка с основной сутью от первого лица, писать без разрыва после двоеточия),
      два разрыва строки,
      👉 (3-6 строк с деталями от третьего лица, раскрывающими суть высказывания и возможные вопросы автора, писать без разрыва после двоеточия).
      (тут должны быть только эти два раздела, без дополнительных подзаголовков)

messages:
  listening: 🤔 Слушаю
  start: Привет! Отправь мне голосовое сообщение, и я сделаю из него краткое содержание
  error: Произошла ошибка при обработке голосового сообщения. Попробуйте еще раз
  failure: 😞 Не удалось обработать сообщение. Попробуй, пожалуйста, ещё раз позже
  retry: 🤔 Пока не сдаюсь, ещё чуть-чуть

rate_limit:
  max_requests: 10
  time_window: 1h

num_workers: 5
wait_on_error: 3s
